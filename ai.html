<!DOCTYPE html>
<html>
<head>
    <title>AI Stock Prediction</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
</head>
<body>
    <h1>AI Stock Prediction</h1>
    <button onclick="window.location.href='index.html'">Back to Dashboard</button>
    <button onclick="logout()">Logout</button>

    <section>
        <h2>Products</h2>
        <input type="text" id="searchProductAI" placeholder="Search" oninput="renderProductsAI()">
        <table id="aiProductTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Quantity</th>
                    <th>Predicted Next Demand</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="js/auth.js"></script>
    <script src="js/stock.js"></script>
    <script src="js/ai.js"></script>
    <script>
        // Render AI table
        function renderProductsAI(){
            const products = getProducts();
            const search = document.getElementById("searchProductAI").value.toLowerCase();
            const tbody = document.querySelector("#aiProductTable tbody");
            tbody.innerHTML = "";

            products.filter(p => p.name.toLowerCase().includes(search))
            .forEach(p => {
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td ${p.quantity<5 ? 'style="color:red"' : ''}>${p.quantity}</td>
                    <td id="pred-${p.id}">-</td>
                    <td><button onclick="predictForRow(${p.id})">Predict</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Predict and show in table
        async function predictForRow(productId){
            const predCell = document.getElementById(`pred-${productId}`);
            predCell.innerText = "Predicting...";
            try {
                const prediction = await predictNext(productId);
                predCell.innerText = prediction ? Math.round(prediction) : "N/A";
            } catch(e){
                predCell.innerText = "Error";
            }
        }

        // Initial render
        if(document.querySelector("#aiProductTable tbody")) renderProductsAI();
    </script>
</body>
</html>
